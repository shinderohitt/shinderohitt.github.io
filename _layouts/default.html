<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
    {{ page.title }}
    {% else %}
    {{ site.name }}
    {% endif %}
  </title>
  <link rel="shortcut icon" href="{{ site.baseurl | absolute_url }}assets/images/favicon.ico">
  <link rel="stylesheet" href="{{ site.baseurl | absolute_url }}assets/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="My Blog" href="{{ site.baseurl | absolute_url }}rss.xml">
  <link rel="stylesheet" href="{{ site.baseurl | absolute_url }}assets/css/highlight.css">
  <script>
   (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
     (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
                            m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
   })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

   ga('create', 'UA-104099613-1', 'auto');
   ga('send', 'pageview');

  </script>
</head>
<body>

  {% include navigation.html %}

  {% if page.profile %}
  {% include profile.html %}
  {% endif %}

  <section id="wrapper" class="{% if page.profile %}home{% endif %}">
    {{ content }}
  </section>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
  <script src="{{ site.baseurl | absolute_url }}assets/js/main.js"></script>
  <script src="{{ site.baseurl | absolute_url }}assets/js/highlight.js"></script>
  <script>hljs.initHighlightingOnLoad();</script>
</body>
</html>
